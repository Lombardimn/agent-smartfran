<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>SmartFran Cloud - Asistente</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

            "secondary-fixed":            "#e8ddff",

            "inverse-primary":            "#e6b4ff",
            "on-secondary-fixed":         "#1f1144",
            "error-container":            "#ffdad6",
            "on-secondary":               "#ffffff",

            "on-primary-container":       "#fef1ff",
            "on-error":                   "#ffffff",
            "secondary-fixed-dim":        "#cebefb",
            "outline-variant":            "#d3c0d8",
            "on-primary-fixed":           "#30004a",
            "outline":                    "#817287",
            "on-background":              "#1f1144",
            "surface-tint":               "#9300d9",
            "inverse-surface":            "#35285b",
            "error":                      "#ba1a1a",
            "surface-container-lowest":   "#ffffff",
            "primary":                    "#8a00cb",
            "on-primary":                 "#ffffff",
            "inverse-on-surface":         "#f5eeff",
            "surface-dim":                "#e0d4ff",
            "tertiary-fixed-dim":         "#40dae3",
            "surface-bright":             "#fdf7ff",
            "on-tertiary-fixed-variant":  "#004f53",
            "on-secondary-container":     "#594c81",
            "primary-fixed":              "#f5d9ff",
            "on-surface":                 "#1f1144",
            "surface-container-highest":  "#e8ddff",
            "on-primary-fixed-variant":   "#7000a6",
            "primary-fixed-dim":          "#e6b4ff",
            "on-tertiary-fixed":          "#002022",
            "on-error-container":         "#93000a",
            "on-tertiary":                "#ffffff",
            "surface-container":          "#f3eaff",

            "secondary":                  "#63568c",

  <style>
    body { font-family: 'Manrope', sans-serif; }
    h1, h2, h3, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    /* ── Fondo exterior — idéntico al login (deep space) ── */
    .bg-deep-space { background: radial-gradient(circle at top right, #35285b, #0f0035); }
    .glow-accent   { filter: blur(80px); background: #ae00ff; opacity: 0.15; }

    /* ── Card del chat — igual a solicitud-enviada.html ── */
    /* bg-mesh claro + glass opaco sobre él                  */
    .chat-card {
      background-color: #fdf7ff;
      background-image:
        radial-gradient(at 0% 0%,   hsla(274,100%,90%,1) 0, transparent 50%),
        radial-gradient(at 50% 0%,  hsla(281,100%,85%,1) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(262,100%,92%,1) 0, transparent 50%);
    }

    /* ── Header / Footer de la card — glass claro ── */
    /* Igual que .glass-card de solicitud-enviada pero como
       franja interna de la card ya clara.                   */
    .panel-header {
      background: rgba(253, 247, 255, 0.82);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-bottom: 1px solid rgba(211, 192, 216, 0.30);
    }
    .panel-footer {
      background: rgba(253, 247, 255, 0.82);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-top: 1px solid rgba(211, 192, 216, 0.30);
    }

    .signature-gradient { background: linear-gradient(135deg, #5a45d4 0%, #6e59ee 100%); }

    /* ── Scrollbar light ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d3c0d8; border-radius: 10px; }

    /* ── Status dot ── */
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 0 2px rgba(0,98,103,0.2); }
      50%      { box-shadow: 0 0 0 5px rgba(0,98,103,0); }
    }
    .status-dot { animation: pulse-dot 2.5s ease infinite; }

    /* ── Message entrance ── */
    @keyframes msg-in {
      from { opacity:0; transform: translateY(10px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .msg-in { animation: msg-in 0.28s cubic-bezier(0.34,1.4,0.64,1) both; }

    /* ── Typing dots ── */
    @keyframes bounce-dot {
      0%,60%,100% { transform:translateY(0); opacity:0.45; }
      30%          { transform:translateY(-5px); opacity:1; }
    }
    .dot-1 { animation: bounce-dot 1.3s ease infinite; }
    .dot-2 { animation: bounce-dot 1.3s 0.18s ease infinite; }
    .dot-3 { animation: bounce-dot 1.3s 0.36s ease infinite; }

    /* ══════════════════════════════════════════════════════
       ÁREA DE MENSAJES
       Fondo: surface-container-low del design system
       (#f8f1ff) — mismo token que usa venta-minorista.
    ══════════════════════════════════════════════════════ */
    /* .chat-bg {
      background-color: #f3eaff;
      /* Trama geométrica muy sutil — no compite con el texto
      background-image:
        repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(138,0,203,0.035) 39px, rgba(138,0,203,0.035) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(138,0,203,0.035) 39px, rgba(138,0,203,0.035) 40px);
    } */

    .chat-bg {
      background-color: #f3eaff;
      background-image: radial-gradient(circle, rgba(138,0,203,0.12) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* ══════════════════════════════════════════════════════
       BURBUJAS — modo claro, tokens del design system
    ══════════════════════════════════════════════════════ */

    /* BOT — superficie blanca (#fff) con sombra ambient.
       Texto: on-surface (#1f1144). Contraste ≥ 14:1. */
    .bubble-bot {
      background: #ffffff;
      color: #1f1144;
      border-radius: 0.375rem 1.5rem 1.5rem 1.5rem;
      box-shadow:
        0 1px 2px rgba(31,17,68,0.06),
        0 4px 16px rgba(31,17,68,0.08);
    }

    /* USER — signature gradient + texto blanco.
       Contraste ≥ 4.5:1 sobre el gradiente. */
    .bubble-user {
      background: #d8d1ff;
      color: #1f1144;
      border-radius: 1.5rem 0.375rem 1.5rem 1.5rem;
      box-shadow:
        0 1px 2px rgba(31,17,68,0.10),
        0 4px 20px rgba(138,0,203,0.22);
    }

    /* ── Markdown — bot (light) ── */
    .bubble-bot h1,.bubble-bot h2,.bubble-bot h3 {
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:700;
      color:#1f1144; margin:10px 0 5px; font-size:.9rem; line-height:1.3;
    }
    .bubble-bot p   { margin-bottom:6px; color:#1f1144; }
    .bubble-bot ul,.bubble-bot ol { padding-left:1.2rem; margin-bottom:6px; color:#1f1144; }
    .bubble-bot li  { margin-bottom:3px; }
    .bubble-bot strong { font-weight:700; color:#5a008a; }
    .bubble-bot a   { color:#8a00cb; text-decoration:underline; }
    .bubble-bot code {
      background:#f3eaff; color:#7000a6;
      padding:2px 6px; border-radius:5px; font-size:.78rem;
      border:1px solid #e8ddff;
    }
    .bubble-bot pre {
      background:#f8f1ff; border-radius:.75rem; padding:10px 12px;
      margin:8px 0; overflow-x:auto; border:1px solid #e8ddff;
    }
    .bubble-bot pre code { background:transparent; border:none; padding:0; color:#4f4255; font-size:.78rem; }
    .bubble-bot table { width:100%; border-collapse:collapse; margin:8px 0; font-size:.78rem; border-radius:.75rem; overflow:hidden; }
    .bubble-bot th  { background:#ede4ff; color:#1f1144; font-weight:700; padding:7px 11px; text-align:left; font-family:'Plus Jakarta Sans',sans-serif; font-size:.75rem; letter-spacing:.02em; }
    .bubble-bot td  { background:#f8f1ff; color:#1f1144; padding:7px 11px; text-align:left; border-top:1px solid #e8ddff; }
    .bubble-bot blockquote { border-left:3px solid #d3c0d8; padding-left:10px; margin:6px 0; color:#4f4255; font-style:italic; }
    .bubble-bot hr  { border:none; border-top:1px solid #e8ddff; margin:10px 0; }

    /* ── Markdown — user (sobre gradient oscuro) ── */
    .bubble-user h1,.bubble-user h2,.bubble-user h3 {
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:700;
      color: #1f1144; margin:10px 0 5px; font-size:.9rem; line-height:1.3;
    }
    .bubble-user p   { margin-bottom:6px; color: #1f1144; }
    .bubble-user ul,.bubble-user ol { padding-left:1.2rem; margin-bottom:6px; color: #1f1144; }
    .bubble-user li  { margin-bottom:3px; }
    .bubble-user strong { font-weight:700; color: #30004a; }
    .bubble-user code {
      background:rgba(0,0,0,0.20); color:#ffe0ff;
      padding:2px 6px; border-radius:5px; font-size:.78rem;
    }
    .bubble-user pre { background:rgba(0,0,0,0.22); border-radius:.75rem; padding:10px 12px; margin:8px 0; overflow-x:auto; }
    .bubble-user pre code { background:transparent; border:none; padding:0; color:rgba(255,255,255,0.9); font-size:.78rem; }
    .bubble-user table { width:100%; border-collapse:collapse; margin:8px 0; font-size:.78rem; border-radius:.75rem; overflow:hidden; }
    .bubble-user th { background:rgba(0,0,0,0.25); color:#ffe0ff; font-weight:700; padding:7px 11px; text-align:left; font-size:.75rem; }
    .bubble-user td { background:rgba(0,0,0,0.12); color:#fff; padding:7px 11px; border-top:1px solid rgba(255,255,255,0.1); }
    .bubble-user blockquote { border-left:3px solid rgba(255,255,255,0.4); padding-left:10px; margin:6px 0; color:rgba(255,255,255,0.85); font-style:italic; }
    .bubble-user hr { border:none; border-top:1px solid rgba(255,255,255,0.2); margin:10px 0; }

    /* ── Sessions panel ── */
    .sessions-panel {
      display: none;
      position: absolute;
      top: 116px;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      max-width: 600px;
      z-index: 50;
    }

    /* ── Sessions panel card (light) ── */
    .sessions-card {
      background: rgba(253, 247, 255, 0.96);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(211, 192, 216, 0.40);
      box-shadow: 0 20px 60px rgba(31,17,68,0.14), 0 4px 16px rgba(138,0,203,0.06);
    }
  </style>
</head>

<body class="font-body text-on-background min-h-screen flex items-center justify-center overflow-hidden">

  <!-- ── Fondo exterior deep space — idéntico al login ── -->
  <div class="fixed inset-0 bg-deep-space -z-10"></div>
  <div class="fixed top-[-10%] right-[-10%] w-[40rem] h-[40rem] rounded-full glow-accent -z-10"></div>
  <div class="fixed bottom-[-20%] left-[-10%] w-[50rem] h-[50rem] rounded-full glow-accent -z-10" style="background:#8a00cb;"></div>
  <div class="hidden lg:block fixed top-20 left-20 w-32 h-32 rounded-lg opacity-10 rotate-12 bg-primary -z-10"></div>
  <div class="hidden lg:block fixed bottom-40 right-40 w-48 h-48 rounded-full opacity-5 -z-10" style="background:#6bf6ff;"></div>

  <!-- ── Chat container ── -->
  <main class="relative z-10 w-full max-w-2xl px-4 py-6 flex flex-col" style="height:100svh;">

    <!-- Card principal — light, igual a solicitud-enviada -->
    <div class="chat-card rounded-lg flex flex-col flex-1 overflow-hidden relative
                shadow-2xl shadow-on-background/40
                border border-white/60"
         style="min-height:0;">

      <!-- Luz decorativa top-right (igual a la card de solicitud-enviada) -->
      <div class="absolute -top-16 -right-16 w-40 h-40 bg-primary-container/15 rounded-full blur-3xl pointer-events-none"></div>
      <div class="absolute -bottom-16 -left-16 w-40 h-40 bg-tertiary/8  rounded-full blur-3xl pointer-events-none"></div>

      <!-- ══ HEADER ══ -->
      <header class="panel-header rounded-t-lg px-6 py-4 flex-shrink-0 relative z-10">
        <div class="flex items-center justify-between mb-3.5">
          <!-- Brand -->
          <div class="flex items-center gap-3">
            <img src="./Nacho.svg" alt="smartfran" class="w-10 h-10 rounded-full object-cover" />
              <div>
                <p class="font-headline font-bold text-on-background leading-tight tracking-tight" style="font-size:1rem;">
                  Asistente Smart-IA
              </p>
              <p class="font-label text-[0.67rem] text-on-surface-variant font-medium flex items-center gap-1.5 mt-0.5">
                <span class="status-dot w-1.5 h-1.5 rounded-full bg-tertiary inline-block flex-shrink-0"></span>
                En línea · Cloud POS
              </p>
            </div>
          </div>
          <!-- Acciones -->
          <div class="flex items-center gap-1">
            <button onclick="toggleSessions()"
              class="flex items-center gap-1 px-3 py-1.5 rounded-full text-primary/70 hover:text-primary hover:bg-primary/8 transition-all text-xs font-semibold font-label">
              <span class="material-symbols-outlined text-[14px]">history</span>
              Sesiones
            </button>
            <button onclick="newSession()"
              class="flex items-center gap-1 px-3 py-1.5 rounded-full text-primary/70 hover:text-primary hover:bg-primary/8 transition-all text-xs font-semibold font-label">
              <span class="material-symbols-outlined text-[14px]">add</span>
              Nueva
            </button>
          </div>
        </div>

        <!-- Franchise ID input -->
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary transition-colors text-[15px]">badge</span>
          <input
            id="franchiseInput" type="text" placeholder="Franchise ID..."
            class="w-full bg-surface-container-high border-none rounded-full py-2.5 pl-10 pr-4 text-on-background placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 transition-all outline-none text-sm font-label font-medium"
          />
        </div>
      </header>

      <!-- ══ SESSIONS PANEL ══ -->
      <div class="sessions-panel" id="sessionsPanel">
        <div class="sessions-card rounded-lg max-h-72 overflow-y-auto">
          <p class="font-headline font-bold text-on-background text-[13px] px-5 pt-4 pb-2 sticky top-0 bg-surface/95 backdrop-blur-sm rounded-t-lg">
            Sesiones guardadas
          </p>
          <div id="sessionsList"></div>
        </div>
      </div>

      <!-- ══ MENSAJES ══ -->
      <div id="messages"
        class="chat-bg flex-1 overflow-y-auto px-4 py-5 flex flex-col gap-1.5"
        style="min-height:0;">
      </div>

      <!-- ══ INPUT FOOTER ══ -->
      <footer class="panel-footer rounded-b-xl px-4 py-3 flex items-center gap-3 flex-shrink-0">
        <input
          id="messageInput" type="text" placeholder="Escribí tu consulta..." autocomplete="off"
          class="flex-1 bg-surface-container-high border-none rounded-full py-3 px-5 text-on-background placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 transition-all outline-none text-sm font-label font-medium"
        />
        <button id="sendBtn" onclick="sendMessage()"
          class="signature-gradient w-11 h-11 rounded-full flex items-center justify-center flex-shrink-0 text-white shadow-lg shadow-primary/25 hover:brightness-110 active:scale-95 transition-all disabled:opacity-30 disabled:cursor-not-allowed disabled:brightness-75">
          <span class="material-symbols-outlined text-[20px]"
            style="font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24;">send</span>
        </button>
      </footer>

    </div>
  </main>

  <script>
    const SESSION_ID = (() => {
      let id = localStorage.getItem('session_id');
      if (!id) { id = 'session_' + Date.now(); localStorage.setItem('session_id', id); }
      return id;
    })();
    const API_URL = 'http://localhost:8000/chat/';

    const messageInput      = document.getElementById('messageInput');
    const franchiseInput    = document.getElementById('franchiseInput');
    const messagesContainer = document.getElementById('messages');
    const sendBtn           = document.getElementById('sendBtn');

    franchiseInput.value = localStorage.getItem('franchise_id') || '';
    franchiseInput.addEventListener('change', () => {
      localStorage.setItem('franchise_id', franchiseInput.value.trim());
    });
    messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    async function sendMessage() {
      const message     = messageInput.value.trim();
      const franchiseId = franchiseInput.value.trim();
      if (!message) return;
      if (!franchiseId) { alert('Ingresá tu Franchise ID antes de enviar.'); franchiseInput.focus(); return; }

      messagesContainer.querySelector('.welcome-hint')?.remove();
      messageInput.value = '';
      sendBtn.disabled   = true;
      addMessage(message, 'user');
      const typingEl = addTyping();

      try {
        const response = await fetch(API_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ message, session_id: SESSION_ID, franchise_id: franchiseId, user_id: 'ui_user' })
        });
        typingEl.remove();
        if (!response.ok) { const err = await response.json(); throw new Error(err.detail || 'API Error'); }
        const data = await response.json();
        addMessage(data.response, 'bot', data.agent_type);
      } catch (error) {
        typingEl.remove();
        addMessage('Error: ' + error.message, 'bot');
        console.error(error);
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    function addMessage(text, role, agent = '') {
      const wrap = document.createElement('div');
      wrap.className = `flex msg-in mb-1 ${role === 'user' ? 'justify-end' : 'justify-start'}`;

      const bubble = document.createElement('div');
      bubble.className = `${role === 'user' ? 'bubble-user' : 'bubble-bot'} max-w-[80%] px-4 py-3 text-[0.84rem] leading-relaxed font-label`;

      if (role === 'bot') { bubble.innerHTML = marked.parse(text); }
      else                { bubble.textContent = text; }

      if (agent) {
        const badge = document.createElement('div');
        badge.className = 'inline-flex items-center gap-1.5 mt-2.5 text-[10px] font-semibold font-label px-2.5 py-1 rounded-full';
        badge.style.cssText = 'background:rgba(0,98,103,0.10);color:#006267;border:1px solid rgba(0,98,103,0.18);';
        badge.innerHTML = `<span style="width:5px;height:5px;border-radius:50%;background:#006267;display:inline-block;flex-shrink:0;"></span>Agente: ${agent}`;
        bubble.appendChild(badge);
      }

      wrap.appendChild(bubble);
      messagesContainer.appendChild(wrap);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'flex justify-start msg-in mb-1';
      wrap.innerHTML = `
        <div class="bubble-bot px-5 py-4 flex items-center gap-2">
          <span class="dot-1 inline-block w-2 h-2 rounded-full" style="background:#d3c0d8;"></span>
          <span class="dot-2 inline-block w-2 h-2 rounded-full" style="background:#d3c0d8;"></span>
          <span class="dot-3 inline-block w-2 h-2 rounded-full" style="background:#d3c0d8;"></span>
        </div>`;
      messagesContainer.appendChild(wrap);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      return wrap;
    }

    function showWelcome() {
      const wrap = document.createElement('div');
      wrap.className = 'welcome-hint flex flex-col items-center justify-center flex-1 gap-3 py-10';
      wrap.innerHTML = `
        <img src="./Nacho.svg" alt="smartfran" class="w-20 h-20 rounded-full object-cover" />
        <p class="font-headline font-bold text-[.85rem] text-center text-on-surface-variant/50">
          ¡Hola! Ingresá tu Franchise ID y<br>preguntame lo que necesites.
        </p>`;
      messagesContainer.appendChild(wrap);
    }

    function newSession() {
      if (confirm('¿Iniciar una nueva sesión? Podrás volver a esta desde "Sesiones".')) {
        localStorage.removeItem('session_id'); location.reload();
      }
    }

    async function toggleSessions() {
      const panel = document.getElementById('sessionsPanel');
      if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
      panel.style.display = 'block';
      const list = document.getElementById('sessionsList');
      list.innerHTML = `<p class="px-5 py-4 text-xs text-on-surface-variant/50 font-label">Cargando...</p>`;

      try {
        const res      = await fetch('http://localhost:8000/chat/sessions/');
        const sessions = await res.json();
        if (!sessions.length) {
          list.innerHTML = `<p class="px-5 py-6 text-center text-xs text-on-surface-variant/40 font-label">No hay sesiones guardadas.</p>`;
          return;
        }
        list.innerHTML = sessions.map(s => {
          const isActive = s.session_id === SESSION_ID;
          const date     = new Date(s.updated_at).toLocaleString('es-AR');
          const summary  = s.summary ? s.summary.substring(0, 80) + '…' : 'Sin resumen';
          return `
            <div id="si-${s.session_id}"
              class="px-5 py-3 cursor-pointer transition-colors hover:bg-primary/5 ${isActive ? 'bg-primary/5' : ''}"
              onclick="loadSession('${s.session_id}')">
              <p class="font-headline font-bold text-[11px] text-primary">${isActive ? '▶ Sesión actual' : s.session_id}</p>
              <p class="text-[10px] text-on-surface-variant/50 font-label mt-0.5">Usuario: ${s.user_id} · ${date}</p>
              <p class="text-[11px] text-on-surface-variant/70 font-label mt-1 truncate">${summary}</p>
              ${!isActive ? `
              <div class="mt-2">
                <button onclick="deleteSession(event,'${s.session_id}')"
                  class="text-[10px] font-semibold font-label px-3 py-1 rounded-full transition-colors"
                  style="background:rgba(186,26,26,0.08);color:#ba1a1a;">
                  Eliminar
                </button>
              </div>` : ''}
            </div>`;
        }).join('');
      } catch(e) {
        list.innerHTML = `<p class="px-5 py-4 text-center text-xs text-on-surface-variant/40 font-label">Error al cargar sesiones.</p>`;
      }
    }

    async function loadSession(sessionId) {
      if (sessionId === SESSION_ID) { document.getElementById('sessionsPanel').style.display = 'none'; return; }
      localStorage.setItem('session_id', sessionId); location.reload();
    }

    async function deleteSession(event, sessionId) {
      event.stopPropagation();
      if (!confirm('¿Eliminar esta sesión permanentemente?')) return;
      try {
        const res = await fetch(`http://localhost:8000/chat/sessions/${sessionId}`, { method: 'DELETE' });
        if (res.ok) {
          document.getElementById(`si-${sessionId}`)?.remove();
          const list = document.getElementById('sessionsList');
          if (!list.children.length)
            list.innerHTML = `<p class="px-5 py-6 text-center text-xs text-on-surface-variant/40 font-label">No hay sesiones guardadas.</p>`;
        } else { alert('Error al eliminar la sesión.'); }
      } catch(e) { alert('Error de conexión.'); }
    }

    document.addEventListener('click', e => {
      const panel = document.getElementById('sessionsPanel');
      if (panel.style.display === 'block'
        && !panel.contains(e.target)
        && !e.target.closest('button[onclick*="toggleSessions"]'))
        panel.style.display = 'none';
    });

    window.addEventListener('load', async () => {
      try {
        const msgsRes  = await fetch(`http://localhost:8000/chat/sessions/${SESSION_ID}/messages`);
        const messages = await msgsRes.json();
        if (messages && messages.length > 0) {
          messages.forEach(m => addMessage(m.content, m.role === 'user' ? 'user' : 'bot', m.agent_type || ''));
          return;
        }
        const sessRes  = await fetch('http://localhost:8000/chat/sessions/');
        const sessions = await sessRes.json();
        const current  = sessions.find(s => s.session_id === SESSION_ID);
        if (current && current.summary) {
          const date = new Date(current.updated_at).toLocaleString('es-AR');
          addMessage(`¡Hola de nuevo! Retomamos tu sesión del **${date}**.\n\n**Resumen:**\n${current.summary}`, 'bot');
        } else { showWelcome(); }
      } catch(e) { showWelcome(); }
    });
  </script>
</body>
</html>
