<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Multi-Agente</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #8a00cb;
            --primary-container: #ae00ff;
            --background: #fdf7ff;
            --surface: #fdf7ff;
            --surface-container: #f3eaff;
            --surface-container-low: #f8f1ff;
            --surface-container-high: #ede4ff;
            --surface-container-highest: #e8ddff;
            --surface-container-lowest: #ffffff;
            --on-background: #1f1144;
            --on-surface: #1f1144;
            --on-surface-variant: #4f4255;
            --inverse-surface: #35285b;
            --outline-variant: #d3c0d8;
            --secondary: #63568c;
            --secondary-fixed: #e8ddff;
            --primary-fixed-dim: #e6b4ff;
            --tertiary: #006267;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--background);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Subtle ambient background texture */
            background-image:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(174,0,255,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(138,0,203,0.05) 0%, transparent 55%);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        /* ── Container ── */
        .container {
            width: 100%;
            max-width: 720px;
            height: 92vh;
            background: var(--surface-container-lowest);
            border-radius: 2rem;
            box-shadow:
                0 40px 80px -5px rgba(31,17,68,0.10),
                0 0 0 1px rgba(211,192,216,0.25);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ── Header glassmorphism ── */
        .header {
            background: rgba(253, 247, 255, 0.82);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-bottom: 1px solid rgba(211,192,216,0.18);
            padding: 18px 24px 16px;
            border-radius: 2rem 2rem 0 0;
            position: relative;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--on-background);
            letter-spacing: -0.02em;
        }

        .header-subtitle {
            font-size: 0.7rem;
            color: var(--on-surface-variant);
            font-weight: 500;
            margin-top: 1px;
        }

        /* Status dot */
        .status-dot {
            width: 8px; height: 8px;
            background: #006267;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 0 2px rgba(0,98,103,0.2);
            animation: pulse-dot 2.5s ease infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 2px rgba(0,98,103,0.2); }
            50% { box-shadow: 0 0 0 5px rgba(0,98,103,0); }
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Glass pill buttons */
        .btn-glass {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 13px;
            background: rgba(138,0,203,0.07);
            color: var(--primary);
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            white-space: nowrap;
            transition: background 0.2s, transform 0.15s;
            letter-spacing: 0.01em;
        }
        .btn-glass .material-symbols-outlined { font-size: 15px; }
        .btn-glass:hover {
            background: rgba(138,0,203,0.13);
            transform: translateY(-1px);
        }

        /* Franchise input row */
        .header-config {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .material-symbols-outlined {
            position: absolute;
            left: 12px;
            font-size: 16px;
            color: var(--on-surface-variant);
            pointer-events: none;
        }

        .header-config input[type="text"] {
            width: 100%;
            padding: 9px 12px 9px 36px;
            border-radius: 9999px;
            border: none;
            font-size: 12.5px;
            font-family: 'Manrope', sans-serif;
            font-weight: 500;
            background: var(--surface-container-high);
            color: var(--on-background);
            outline: none;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .header-config input[type="text"]::placeholder { color: var(--on-surface-variant); opacity: 0.7; }
        .header-config input[type="text"]:focus {
            background: var(--surface-container-highest);
            box-shadow: 0 0 0 2px rgba(138,0,203,0.15);
        }

        /* ── Sessions panel ── */
        .sessions-panel {
            display: none;
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 640px;
            background: var(--surface-container-lowest);
            border-radius: 1.5rem;
            box-shadow:
                0 20px 60px rgba(31,17,68,0.14),
                0 0 0 1px rgba(211,192,216,0.3);
            z-index: 100;
            max-height: 380px;
            overflow-y: auto;
        }

        .sessions-panel::-webkit-scrollbar { width: 5px; }
        .sessions-panel::-webkit-scrollbar-track { background: transparent; }
        .sessions-panel::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius: 10px; }

        .sessions-panel h3 {
            padding: 16px 20px 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--on-background);
            position: sticky;
            top: 0;
            background: var(--surface-container-lowest);
            border-radius: 1.5rem 1.5rem 0 0;
            letter-spacing: -0.01em;
        }

        .session-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .session-item:hover { background: var(--surface-container-low); }
        .session-item.active { background: rgba(138,0,203,0.05); }

        .session-id {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .session-meta { font-size: 11px; color: var(--on-surface-variant); margin-top: 2px; opacity: 0.8; }
        .session-summary { font-size: 12px; color: var(--on-surface-variant); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-actions { display: flex; gap: 6px; margin-top: 8px; }

        .btn-delete-session {
            font-size: 11px;
            padding: 4px 12px;
            background: rgba(186,26,26,0.07);
            color: #ba1a1a;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            transition: background 0.15s;
        }
        .btn-delete-session:hover { background: rgba(186,26,26,0.14); }

        .sessions-empty {
            padding: 28px 20px;
            text-align: center;
            color: var(--on-surface-variant);
            font-size: 13px;
            opacity: 0.7;
        }

        /* ── Chat messages area ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            background: var(--surface-container-low);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius: 10px; }

        .message {
            display: flex;
            gap: 10px;
            animation: msg-in 0.3s cubic-bezier(0.34,1.4,0.64,1) both;
            margin-bottom: 8px;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(10px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user { justify-content: flex-end; }

        .message-content {
            max-width: 78%;
            padding: 13px 17px;
            border-radius: 1.5rem;
            font-size: 13.5px;
            line-height: 1.6;
            word-wrap: break-word;
            font-family: 'Manrope', sans-serif;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            color: white;
            border-radius: 1.5rem 1.5rem 0.4rem 1.5rem;
        }

        .message.bot .message-content {
            background: var(--surface-container-lowest);
            color: var(--on-surface);
            border-radius: 1.5rem 1.5rem 1.5rem 0.4rem;
            box-shadow: 0 2px 12px rgba(31,17,68,0.06);
        }

        /* Markdown inside messages */
        .message-content h1, .message-content h2, .message-content h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 10px 0 5px;
            font-size: 14px;
            font-weight: 700;
            color: var(--on-background);
        }
        .message-content p { margin-bottom: 6px; }
        .message-content ul, .message-content ol { padding-left: 18px; margin-bottom: 6px; }
        .message-content li { margin-bottom: 3px; }
        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
            font-size: 12.5px;
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .message-content th, .message-content td {
            padding: 8px 12px;
            text-align: left;
        }
        .message-content th {
            background: var(--surface-container-high);
            font-weight: 700;
            color: var(--on-background);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .message-content td { background: var(--surface-container-low); }
        .message-content strong { font-weight: 700; }
        .message-content code {
            background: var(--surface-container-high);
            color: var(--primary);
            padding: 1px 6px;
            border-radius: 6px;
            font-size: 12px;
        }
        .message.user .message-content code {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .message.user .message-content h1,
        .message.user .message-content h2,
        .message.user .message-content h3 { color: white; }

        /* Agent badge */
        .agent-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10.5px;
            margin-top: 8px;
            font-weight: 600;
            color: var(--tertiary);
            background: rgba(0,98,103,0.08);
            padding: 3px 10px;
            border-radius: 9999px;
        }
        .agent-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--tertiary);
            display: inline-block;
        }

        /* ── Input section ── */
        .input-section {
            padding: 14px 18px;
            background: rgba(253, 247, 255, 0.82);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-top: 1px solid rgba(211,192,216,0.18);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            border-radius: 0 0 2rem 2rem;
        }

        .input-section input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface-container-high);
            border: none;
            border-radius: 9999px;
            font-size: 13.5px;
            font-family: 'Manrope', sans-serif;
            font-weight: 500;
            color: var(--on-background);
            outline: none;
            transition: background 0.2s, box-shadow 0.2s;
            resize: none;
        }
        .input-section input[type="text"]::placeholder { color: var(--on-surface-variant); opacity: 0.65; }
        .input-section input[type="text"]:focus {
            background: var(--surface-container-highest);
            box-shadow: 0 0 0 2px rgba(138,0,203,0.18);
        }

        /* Primary send button */
        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 9999px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px rgba(138,0,203,0.3);
            padding: 0;
            font-family: 'Manrope', sans-serif;
        }
        .btn-send .material-symbols-outlined {
            font-size: 20px;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }
        .btn-send:hover {
            transform: scale(1.07) translateY(-1px);
            box-shadow: 0 8px 24px rgba(138,0,203,0.38);
        }
        .btn-send:disabled {
            background: var(--outline-variant);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Typing indicator ── */
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: var(--surface-container-lowest);
            border-radius: 1.5rem 1.5rem 1.5rem 0.4rem;
            width: fit-content;
            box-shadow: 0 2px 12px rgba(31,17,68,0.06);
        }

        .typing span {
            width: 7px; height: 7px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.5;
            animation: bounce 1.3s ease infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.18s; }
        .typing span:nth-child(3) { animation-delay: 0.36s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Welcome message ── */
        .welcome-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 12px;
            padding: 40px 20px;
            opacity: 0.6;
        }

        .welcome-hint .icon {
            width: 52px; height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-hint .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .welcome-hint .icon .material-symbols-outlined {
            font-size: 26px;
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .welcome-hint p {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--on-surface-variant);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <div class="header-brand">
                    <div class="header-logo">
                        <img src="Nacho.svg" alt="Logo" />
                    </div>
                    <div>
                        <div class="header-title">Asistente Multi-Agente</div>
                        <div class="header-subtitle">
                            <span class="status-dot"></span>En línea · Cloud POS
                        </div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-glass" onclick="toggleSessions()">
                        <span class="material-symbols-outlined">history</span>
                        Sesiones
                    </button>
                    <button class="btn-glass" onclick="newSession()">
                        <span class="material-symbols-outlined">add</span>
                        Nueva
                    </button>
                </div>
            </div>

            <div class="header-config">
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">badge</span>
                    <input type="text" id="franchiseInput" placeholder="Franchise ID..." />
                </div>
            </div>
        </div>

        <!-- Sessions panel -->
        <div class="sessions-panel" id="sessionsPanel">
            <h3>Sesiones guardadas</h3>
            <div id="sessionsList"></div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="messages"></div>

        <!-- Input -->
        <div class="input-section">
            <input type="text" id="messageInput" placeholder="Escribí tu consulta..." autocomplete="off" />
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>

    <script>
        const SESSION_ID = (() => {
            let id = localStorage.getItem('session_id');
            if (!id) {
                id = 'session_' + Date.now();
                localStorage.setItem('session_id', id);
            }
            return id;
        })();
        const API_URL = 'http://localhost:8000/chat/';

        const messageInput      = document.getElementById('messageInput');
        const franchiseInput    = document.getElementById('franchiseInput');
        const messagesContainer = document.getElementById('messages');
        const sendBtn           = document.getElementById('sendBtn');

        franchiseInput.value = localStorage.getItem('franchise_id') || '';
        franchiseInput.addEventListener('change', () => {
            localStorage.setItem('franchise_id', franchiseInput.value.trim());
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const message     = messageInput.value.trim();
            const franchiseId = franchiseInput.value.trim();

            if (!message) return;
            if (!franchiseId) {
                alert('Ingresá tu Franchise ID antes de enviar un mensaje.');
                franchiseInput.focus();
                return;
            }

            // Remove welcome hint if present
            const hint = messagesContainer.querySelector('.welcome-hint');
            if (hint) hint.remove();

            messageInput.value = '';
            sendBtn.disabled   = true;
            addMessage(message, 'user');

            const typingEl = addTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message:      message,
                        session_id:   SESSION_ID,
                        franchise_id: franchiseId,
                        user_id:      'ui_user'
                    })
                });

                typingEl.remove();

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'API Error');
                }

                const data = await response.json();
                addMessage(data.response, 'bot', data.agent_type);

            } catch (error) {
                typingEl.remove();
                addMessage('Error: ' + error.message, 'bot');
                console.error(error);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, role, agent = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (role === 'bot') {
                contentDiv.innerHTML = marked.parse(text);
            } else {
                contentDiv.textContent = text;
            }

            if (agent) {
                const badge = document.createElement('div');
                badge.className = 'agent-badge';
                badge.textContent = `Agente: ${agent}`;
                contentDiv.appendChild(badge);
            }

            msgDiv.appendChild(contentDiv);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addTyping() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return msgDiv;
        }

        function newSession() {
            if (confirm('¿Iniciar una nueva sesión? Podrás volver a esta desde "Sesiones".')) {
                localStorage.removeItem('session_id');
                location.reload();
            }
        }

        async function toggleSessions() {
            const panel = document.getElementById('sessionsPanel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                return;
            }
            panel.style.display = 'block';
            const list = document.getElementById('sessionsList');
            list.innerHTML = '<div class="sessions-empty">Cargando sesiones...</div>';

            try {
                const res      = await fetch('http://localhost:8000/chat/sessions/');
                const sessions = await res.json();
                if (!sessions.length) {
                    list.innerHTML = '<div class="sessions-empty">No hay sesiones guardadas.</div>';
                    return;
                }
                list.innerHTML = sessions.map(s => {
                    const isActive = s.session_id === SESSION_ID;
                    const date     = new Date(s.updated_at).toLocaleString('es-AR');
                    const summary  = s.summary ? s.summary.substring(0, 80) + '…' : 'Sin resumen';
                    return `<div class="session-item ${isActive ? 'active' : ''}" id="si-${s.session_id}">
                        <div onclick="loadSession('${s.session_id}')">
                            <div class="session-id">${isActive ? '▶ Sesión actual' : s.session_id}</div>
                            <div class="session-meta">Usuario: ${s.user_id} · ${date}</div>
                            <div class="session-summary">${summary}</div>
                        </div>
                        <div class="session-actions">
                            ${!isActive ? `<button class="btn-delete-session" onclick="deleteSession(event, '${s.session_id}')">Eliminar</button>` : ''}
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                list.innerHTML = '<div class="sessions-empty">Error al cargar sesiones.</div>';
            }
        }

        async function loadSession(sessionId) {
            if (sessionId === SESSION_ID) {
                document.getElementById('sessionsPanel').style.display = 'none';
                return;
            }
            localStorage.setItem('session_id', sessionId);
            location.reload();
        }

        async function deleteSession(event, sessionId) {
            event.stopPropagation();
            if (!confirm('¿Eliminar esta sesión permanentemente?')) return;
            try {
                const res = await fetch(`http://localhost:8000/chat/sessions/${sessionId}`, { method: 'DELETE' });
                if (res.ok) {
                    const el = document.getElementById(`si-${sessionId}`);
                    if (el) el.remove();
                    const list = document.getElementById('sessionsList');
                    if (!list.children.length) {
                        list.innerHTML = '<div class="sessions-empty">No hay sesiones guardadas.</div>';
                    }
                } else {
                    alert('Error al eliminar la sesión.');
                }
            } catch (e) {
                alert('Error de conexión.');
            }
        }

        document.addEventListener('click', (e) => {
            const panel = document.getElementById('sessionsPanel');
            if (!panel.contains(e.target) && !e.target.closest('.btn-glass')) {
                panel.style.display = 'none';
            }
        });

        window.addEventListener('load', async () => {
            try {
                const msgsRes  = await fetch(`http://localhost:8000/chat/sessions/${SESSION_ID}/messages`);
                const messages = await msgsRes.json();

                if (messages && messages.length > 0) {
                    messages.forEach(m => {
                        addMessage(m.content, m.role === 'user' ? 'user' : 'bot', m.agent_type || '');
                    });
                    return;
                }

                const sessRes = await fetch('http://localhost:8000/chat/sessions/');
                const sessions = await sessRes.json();
                const current  = sessions.find(s => s.session_id === SESSION_ID);

                if (current && current.summary) {
                    const date = new Date(current.updated_at).toLocaleString('es-AR');
                    addMessage(`¡Hola de nuevo! Retomamos tu sesión del **${date}**.\n\n**Resumen:**\n${current.summary}`, 'bot');
                } else {
                    showWelcome();
                }
            } catch (e) {
                showWelcome();
            }
        });

        function showWelcome() {
            const hint = document.createElement('div');
            hint.className = 'welcome-hint';
            hint.innerHTML = `
                <div class="icon">
                    <img src="Nacho.svg" alt="Logo" />
                </div>
                <p>¡Hola! Ingresá tu Franchise ID y<br>preguntame lo que necesites.</p>
            `;
            messagesContainer.appendChild(hint);
        }
    </script>
</body>
</html>
